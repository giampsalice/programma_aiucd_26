<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Persone / Schede</title>

  <style>
    :root {
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#1d2433;
      --muted:#677089;
      --line:#e3e8f2;
      --accent:#2047d2;
      --accent-soft:#edf2ff;
      --shadow:0 8px 24px rgba(16,24,40,.08);
      --radius:18px;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap {
      max-width:1200px;
      margin:0 auto;
      padding:24px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .titlebox, .langbox {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px 16px;
    }

    .eyebrow {
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:6px;
    }

    h1 {
      margin:0;
      font-size:28px;
      line-height:1.1;
    }

    .sub {
      margin-top:6px;
      color:var(--muted);
      font-size:14px;
    }

    .lang-toggle {
      display:flex;
      gap:8px;
    }

    .lang-toggle button {
      appearance:none;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:999px;
      padding:10px 14px;
      font-weight:600;
      cursor:pointer;
    }

    .lang-toggle button.active {
      background:var(--accent);
      border-color:var(--accent);
      color:#fff;
    }

    .featured-wrap {
      display:grid;
      gap:14px;
      margin-bottom:24px;
    }

    .featured-header {
      background:linear-gradient(135deg, #eff4ff 0%, #ffffff 100%);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:20px;
    }

    .featured-title {
      margin:0;
      font-size:24px;
      line-height:1.2;
    }

    .featured-subtitle {
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .featured-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:18px;
    }

    .featured-card {
      background:var(--card);
      border:2px solid var(--accent);
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    .featured-card .image-wrap {
      aspect-ratio: 5 / 3;
    }

    .featured-card .content {
      padding:18px;
    }

    .featured-card .name {
      font-size:22px;
    }

    .featured-card .role {
      font-size:16px;
    }

    .badge-row {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:2px;
      margin-bottom:2px;
    }

    .badge {
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:700;
      letter-spacing:.02em;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
    }

    .badge-director {
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }

    .badge-coordinator {
      background:var(--accent-soft);
      color:var(--accent);
      border-color:#cfdcff;
    }

    .toolbar {
      display:grid;
      grid-template-columns:2fr 1fr 1fr auto;
      gap:12px;
      margin-bottom:20px;
      align-items:end;
    }

    .panel {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px 16px;
    }

    .panel input,
    .panel select {
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      outline:none;
      background:#fff;
      color:var(--text);
    }

    .stats {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-start;
    }

    .pill {
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      color:var(--muted);
    }

    .pill strong {
      color:var(--text);
    }

    .section-title {
      margin:0 0 14px;
      font-size:22px;
      line-height:1.2;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
      gap:18px;
    }

    .card {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    .image-wrap {
      aspect-ratio:4 / 3;
      background:#eef2f8;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      border-bottom:1px solid var(--line);
    }

    .image-wrap img {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .placeholder {
      color:var(--muted);
      font-size:14px;
      text-align:center;
      padding:16px;
    }

    .content {
      padding:16px;
      display:grid;
      gap:10px;
    }

    .name {
      margin:0;
      font-size:20px;
      line-height:1.2;
    }

    .role {
      margin:0;
      font-size:15px;
      font-weight:700;
      color:var(--accent);
      line-height:1.35;
    }

    .meta {
      display:grid;
      gap:8px;
    }

    .meta-item {
      display:grid;
      gap:2px;
    }

    .meta-label {
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
    }

    .meta-value {
      font-size:14px;
      line-height:1.45;
      color:var(--text);
    }

    .actions {
      margin-top:8px;
    }

    .button {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      border-radius:999px;
      padding:11px 14px;
      font-size:14px;
      font-weight:700;
      background:var(--accent);
      color:#fff;
      border:1px solid var(--accent);
    }

    .loading, .error, .empty {
      background:#fff;
      border:1px solid var(--line);
      border-radius:20px;
      padding:18px;
      box-shadow:var(--shadow);
      color:var(--muted);
    }

    .pagination-wrap{
      display:flex;
      justify-content:center;
      margin-top:24px;
    }

    .pagination{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:center;
    }

    .pagination button{
      appearance:none;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:999px;
      padding:10px 14px;
      font-weight:600;
      cursor:pointer;
    }

    .pagination button.active{
      background:var(--accent);
      border-color:var(--accent);
      color:#fff;
    }

    .pagination button:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    @media (max-width:980px) {
      .toolbar {
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="titlebox">
        <div class="eyebrow" id="eyebrow">Directory</div>
        <h1 id="pageTitle">Persone</h1>
        <div class="sub" id="pageSubtitle">Componenti del Consiglio del Centro</div>
      </div>

      <div class="langbox">
        <div class="eyebrow">Language</div>
        <div class="lang-toggle">
          <button id="btn-it" class="active">IT</button>
          <button id="btn-en">EN</button>
        </div>
      </div>
    </div>

    <div id="featuredSection" class="featured-wrap"></div>

    <div class="toolbar">
      <div class="panel">
        <div class="eyebrow" id="searchLabel">Cerca</div>
        <input id="searchInput" type="text" placeholder="Cerca per nome, ruolo, dipartimento, ambito" />
      </div>

      <div class="panel">
        <div class="eyebrow" id="deptLabel">Dipartimento</div>
        <select id="deptFilter"></select>
      </div>

      <div class="panel">
        <div class="eyebrow" id="areaLabel">Ambito</div>
        <select id="areaFilter"></select>
      </div>

      <div class="panel">
        <div class="eyebrow" id="statsLabel">Statistiche</div>
        <div class="stats" id="stats"></div>
      </div>
    </div>

    <h2 class="section-title" id="allPeopleTitle"></h2>

    <div id="app" class="loading">Caricamento...</div>

    <div class="pagination-wrap">
      <div id="pagination" class="pagination"></div>
    </div>
  </div>

  <script>
    const CONFIG = {
      csvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXzXVD97NxAGmhibLmX3OkOIf7pH7ybu3VmChRQAM5MCaCC3aj-NADoG1cv2yNSL9IUItRzYmcmCyP/pub?gid=0&single=true&output=csv",
      refreshMs: 300000
    };

    // B=1, C=2, D=3, E=4, G=6, J=9, K=10
    const COL = {
      name: 1,
      role: 2,
      dept: 3,
      area: 4,
      special: 6,
      pageUrl: 9,
      imageUrl: 10
    };

    let currentLang = "it";
    let allItems = [];
    let filteredItems = [];
    let featuredItems = [];
    let currentPage = 1;
    const ITEMS_PER_PAGE = 12;

    const UI = {
      it: {
        eyebrow: "Directory",
        title: "Persone",
        subtitle: "Schede aggiornate dal foglio Google",
        loading: "Caricamento...",
        error: "Errore nel caricamento dei dati.",
        empty: "Nessun risultato.",
        searchLabel: "Cerca",
        searchPlaceholder: "Cerca per nome, ruolo, dipartimento, ambito",
        statsLabel: "Statistiche",
        deptLabel: "Dipartimento",
        areaLabel: "Ambito",
        allDepartments: "Tutti i dipartimenti",
        allAreas: "Tutti gli ambiti",
        total: "schede",
        visible: "visibili",
        role: "Ruolo",
        dept: "Dipartimento",
        area: "Ambito",
        openPage: "Pagina istituzionale",
        noImage: "Immagine non disponibile",
        prev: "Precedente",
        next: "Successiva",
        featuredTitle: "Direzione e coordinamento",
        featuredSubtitle: "Figure di riferimento evidenziate in cima alla directory.",
        director: "Direttore",
        coordinator: "Coordinatore",
        specialRole: "Incarico",
        allPeopleTitle: "Tutte le persone"
      },
      en: {
        eyebrow: "Directory",
        title: "People",
        subtitle: "Cards updated from the Google Sheet",
        loading: "Loading...",
        error: "Error while loading data.",
        empty: "No results.",
        searchLabel: "Search",
        searchPlaceholder: "Search by name, role, department, area",
        statsLabel: "Stats",
        deptLabel: "Department",
        areaLabel: "Area",
        allDepartments: "All departments",
        allAreas: "All areas",
        total: "cards",
        visible: "visible",
        role: "Role",
        dept: "Department",
        area: "Area",
        openPage: "Institutional page",
        noImage: "Image not available",
        prev: "Previous",
        next: "Next",
        featuredTitle: "Leadership and coordination",
        featuredSubtitle: "Key roles highlighted at the top of the directory.",
        director: "Director",
        coordinator: "Coordinator",
        specialRole: "Role",
        allPeopleTitle: "All people"
      }
    };

    function t(key) {
      return UI[currentLang][key] || key;
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let value = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];

        if (ch === '"') {
          if (inQuotes && next === '"') {
            value += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === "," && !inQuotes) {
          row.push(value);
          value = "";
        } else if ((ch === "\n" || ch === "\r") && !inQuotes) {
          if (ch === "\r" && next === "\n") i++;
          row.push(value);
          rows.push(row);
          row = [];
          value = "";
        } else {
          value += ch;
        }
      }

      if (value.length || row.length) {
        row.push(value);
        rows.push(row);
      }

      return rows.map(r => r.map(c => (c || "").trim()));
    }

    function clean(v) {
      return (v || "").replace(/\s+/g, " ").trim();
    }

    function validUrl(v) {
      const s = clean(v);
      return /^https?:\/\//i.test(s) ? s : "";
    }

    function rowToItem(row) {
      const item = {
        name: clean(row[COL.name]),
        role: clean(row[COL.role]),
        dept: clean(row[COL.dept]),
        area: clean(row[COL.area]),
        special: clean(row[COL.special]),
        pageUrl: validUrl(row[COL.pageUrl]),
        imageUrl: validUrl(row[COL.imageUrl])
      };

      if (!item.name) return null;
      return item;
    }

    function getSpecialType(value) {
      const s = clean(value).toLowerCase();
      if (!s) return "";
      if (s.includes("direttore")) return "director";
      if (s.includes("coordinatore")) return "coordinator";
      return "special";
    }

    function getSpecialPriority(item) {
      const type = getSpecialType(item.special);
      if (type === "director") return 0;
      if (type === "coordinator") return 1;
      return 2;
    }

    async function fetchData() {
      const response = await fetch(CONFIG.csvUrl + "&t=" + Date.now(), { cache: "no-store" });
      if (!response.ok) throw new Error("HTTP " + response.status);
      const text = await response.text();
      const rows = parseCsv(text);

      const items = rows.slice(1).map(rowToItem).filter(Boolean);

      items.sort((a, b) => a.name.localeCompare(b.name, "it", { sensitivity: "base" }));

      return items;
    }

    function escapeHtml(str) {
      return (str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function getUniqueValues(key) {
      return [...new Set(allItems.map(item => item[key]).filter(Boolean))].sort((a, b) =>
        a.localeCompare(b, currentLang === "it" ? "it" : "en", { sensitivity: "base" })
      );
    }

    function renderFilterOptions() {
      const deptSelect = document.getElementById("deptFilter");
      const areaSelect = document.getElementById("areaFilter");

      const currentDept = deptSelect.value || "";
      const currentArea = areaSelect.value || "";

      const deptOptions = getUniqueValues("dept");
      const areaOptions = getUniqueValues("area");

      deptSelect.innerHTML = `
        <option value="">${t("allDepartments")}</option>
        ${deptOptions.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("")}
      `;

      areaSelect.innerHTML = `
        <option value="">${t("allAreas")}</option>
        ${areaOptions.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("")}
      `;

      if (deptOptions.includes(currentDept)) deptSelect.value = currentDept;
      if (areaOptions.includes(currentArea)) areaSelect.value = currentArea;
    }

    function renderStats() {
      const stats = document.getElementById("stats");
      stats.innerHTML = `
        <div class="pill"><strong>${allItems.length}</strong> ${t("total")}</div>
        <div class="pill"><strong>${filteredItems.length}</strong> ${t("visible")}</div>
      `;
    }

    function getBadgeHtml(item) {
      const type = getSpecialType(item.special);
      if (!type) return "";

      if (type === "director") {
        return `<span class="badge badge-director">${t("director")}</span>`;
      }

      if (type === "coordinator") {
        return `<span class="badge badge-coordinator">${t("coordinator")}</span>`;
      }

      return `<span class="badge">${escapeHtml(item.special)}</span>`;
    }

    function renderFeaturedCard(item) {
      return `
        <article class="featured-card">
          <div class="image-wrap">
            ${item.imageUrl
              ? `<img src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.name)}" loading="lazy" />`
              : `<div class="placeholder">${t("noImage")}</div>`
            }
          </div>

          <div class="content">
            <div class="badge-row">
              ${getBadgeHtml(item)}
            </div>

            <h2 class="name">${escapeHtml(item.name)}</h2>

            ${item.role ? `<p class="role">${escapeHtml(item.role)}</p>` : ""}

            ${item.special ? `
              <div class="meta-item">
                <div class="meta-label">${t("specialRole")}</div>
                <div class="meta-value">${escapeHtml(item.special)}</div>
              </div>
            ` : ""}

            <div class="meta">
              ${item.dept ? `
                <div class="meta-item">
                  <div class="meta-label">${t("dept")}</div>
                  <div class="meta-value">${escapeHtml(item.dept)}</div>
                </div>
              ` : ""}

              ${item.area ? `
                <div class="meta-item">
                  <div class="meta-label">${t("area")}</div>
                  <div class="meta-value">${escapeHtml(item.area)}</div>
                </div>
              ` : ""}
            </div>

            ${item.pageUrl ? `
              <div class="actions">
                <a class="button" href="${escapeHtml(item.pageUrl)}" target="_blank" rel="noopener noreferrer">
                  ${t("openPage")}
                </a>
              </div>
            ` : ""}
          </div>
        </article>
      `;
    }

    function renderFeaturedSection(items) {
      const box = document.getElementById("featuredSection");

      if (!items.length) {
        box.innerHTML = "";
        return;
      }

      box.innerHTML = `
        <div class="featured-header">
          <div class="eyebrow">${t("featuredTitle")}</div>
          <h2 class="featured-title">${t("featuredTitle")}</h2>
          <div class="featured-subtitle">${t("featuredSubtitle")}</div>
        </div>

        <div class="featured-grid">
          ${items.map(renderFeaturedCard).join("")}
        </div>
      `;
    }

    function renderNormalCard(item) {
      return `
        <article class="card">
          <div class="image-wrap">
            ${item.imageUrl
              ? `<img src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.name)}" loading="lazy" />`
              : `<div class="placeholder">${t("noImage")}</div>`
            }
          </div>

          <div class="content">
            <h2 class="name">${escapeHtml(item.name)}</h2>

            ${item.role ? `<p class="role">${escapeHtml(item.role)}</p>` : ""}

            <div class="meta">
              ${item.role ? `
                <div class="meta-item">
                  <div class="meta-label">${t("role")}</div>
                  <div class="meta-value">${escapeHtml(item.role)}</div>
                </div>
              ` : ""}

              ${item.dept ? `
                <div class="meta-item">
                  <div class="meta-label">${t("dept")}</div>
                  <div class="meta-value">${escapeHtml(item.dept)}</div>
                </div>
              ` : ""}

              ${item.area ? `
                <div class="meta-item">
                  <div class="meta-label">${t("area")}</div>
                  <div class="meta-value">${escapeHtml(item.area)}</div>
                </div>
              ` : ""}
            </div>

            ${item.pageUrl ? `
              <div class="actions">
                <a class="button" href="${escapeHtml(item.pageUrl)}" target="_blank" rel="noopener noreferrer">
                  ${t("openPage")}
                </a>
              </div>
            ` : ""}
          </div>
        </article>
      `;
    }

    function renderCards(items) {
      const app = document.getElementById("app");

      if (!items.length) {
        app.className = "empty";
        app.textContent = t("empty");
        renderPagination(0);
        return;
      }

      const totalPages = Math.ceil(items.length / ITEMS_PER_PAGE);
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;

      const start = (currentPage - 1) * ITEMS_PER_PAGE;
      const end = start + ITEMS_PER_PAGE;
      const pageItems = items.slice(start, end);

      app.className = "grid";
      app.innerHTML = pageItems.map(renderNormalCard).join("");

      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      const box = document.getElementById("pagination");
      if (!box) return;

      if (!totalPages || totalPages <= 1) {
        box.innerHTML = "";
        return;
      }

      let html = `
        <button ${currentPage === 1 ? "disabled" : ""} data-page="${currentPage - 1}">
          ${t("prev")}
        </button>
      `;

      for (let p = 1; p <= totalPages; p++) {
        html += `
          <button class="${p === currentPage ? "active" : ""}" data-page="${p}">
            ${p}
          </button>
        `;
      }

      html += `
        <button ${currentPage === totalPages ? "disabled" : ""} data-page="${currentPage + 1}">
          ${t("next")}
        </button>
      `;

      box.innerHTML = html;

      box.querySelectorAll("[data-page]").forEach(btn => {
        btn.addEventListener("click", () => {
          const nextPage = Number(btn.dataset.page);
          if (!nextPage || btn.disabled) return;
          currentPage = nextPage;
          renderCards(filteredItems);
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });
    }

    function applyFilter() {
      const q = clean(document.getElementById("searchInput").value).toLowerCase();
      const dept = clean(document.getElementById("deptFilter").value);
      const area = clean(document.getElementById("areaFilter").value);

      const matches = allItems.filter(item => {
        const haystack = [
          item.name,
          item.role,
          item.dept,
          item.area,
          item.special
        ].join(" ").toLowerCase();

        const matchesSearch = !q || haystack.includes(q);
        const matchesDept = !dept || item.dept === dept;
        const matchesArea = !area || item.area === area;

        return matchesSearch && matchesDept && matchesArea;
      });

      featuredItems = matches
        .filter(item => getSpecialType(item.special))
        .sort((a, b) => {
          const pa = getSpecialPriority(a);
          const pb = getSpecialPriority(b);
          if (pa !== pb) return pa - pb;
          return a.name.localeCompare(b.name, "it", { sensitivity: "base" });
        });

      filteredItems = matches.filter(item => !getSpecialType(item.special));

      currentPage = 1;
      renderStats();
      renderFeaturedSection(featuredItems);
      renderCards(filteredItems);
    }

    function updateUiText() {
      document.getElementById("eyebrow").textContent = t("eyebrow");
      document.getElementById("pageTitle").textContent = t("title");
      document.getElementById("pageSubtitle").textContent = t("subtitle");
      document.getElementById("searchLabel").textContent = t("searchLabel");
      document.getElementById("statsLabel").textContent = t("statsLabel");
      document.getElementById("deptLabel").textContent = t("deptLabel");
      document.getElementById("areaLabel").textContent = t("areaLabel");
      document.getElementById("searchInput").placeholder = t("searchPlaceholder");
      document.getElementById("allPeopleTitle").textContent = t("allPeopleTitle");
    }

    async function load() {
      const app = document.getElementById("app");
      app.className = "loading";
      app.textContent = t("loading");

      try {
        allItems = await fetchData();
        renderFilterOptions();
        applyFilter();
      } catch (e) {
        app.className = "error";
        app.textContent = t("error");
      }
    }

    function setLanguage(lang) {
      currentLang = lang;
      document.getElementById("btn-it").classList.toggle("active", lang === "it");
      document.getElementById("btn-en").classList.toggle("active", lang === "en");
      updateUiText();
      renderFilterOptions();

      if (allItems.length) {
        applyFilter();
      } else {
        document.getElementById("app").textContent = t("loading");
      }
    }

    document.getElementById("btn-it").addEventListener("click", () => setLanguage("it"));
    document.getElementById("btn-en").addEventListener("click", () => setLanguage("en"));
    document.getElementById("searchInput").addEventListener("input", applyFilter);
    document.getElementById("deptFilter").addEventListener("change", applyFilter);
    document.getElementById("areaFilter").addEventListener("change", applyFilter);

    updateUiText();
    load();
    setInterval(load, CONFIG.refreshMs);
  </script>
</body>
</html>
